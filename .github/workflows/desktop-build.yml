name: Desktop Build

on:
  workflow_dispatch:
  push:
    paths:
      - "electron-app/**"
      - ".github/workflows/desktop-build.yml"

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: build:win
            artifact: vibe-windows
          - os: ubuntu-latest
            script: build:linux
            artifact: vibe-linux
          - os: macos-latest
            script: build:mac
            artifact: vibe-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron-app/package-lock.json

      - name: Install dependencies
        working-directory: electron-app
        run: npm ci

      - name: Build installer
        working-directory: electron-app
        run: npm run ${{ matrix.script }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: electron-app/dist/**
